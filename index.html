<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TEQRA Ads Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f0f10; --card: #1c1c1e; --accent: #0A84FF;
            --text: #ffffff; --hint: #8e8e93; --success: #30D158;
            --grad: linear-gradient(135deg, #0A84FF 0%, #5E5CE6 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding-bottom: 40px; overflow-x: hidden;
        }

        .glass-header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(15, 15, 16, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .header h1 { font-size: 26px; font-weight: 900; margin: 0; letter-spacing: -0.5px; }
        .header h1 span { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-btns { display: flex; gap: 6px; }
        .nav-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text); padding: 7px 12px; border-radius: 10px; 
            font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        .status-line { font-size: 10px; color: var(--success); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; font-weight: 700; text-transform: uppercase; }
        .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .chip { 
            background: rgba(255,255,255,0.05); padding: 10px 18px; border-radius: 14px; 
            font-size: 13px; font-weight: 600; white-space: nowrap; 
            border: 1px solid transparent; transition: 0.2s; cursor: pointer;
        }
        .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        .main-content { padding: 15px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card { 
            background: var(--card); border-radius: 24px; padding: 22px; margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.03); opacity: 0; animation: slideUp 0.4s forwards;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .title { font-size: 20px; font-weight: 800; margin: 0; line-height: 1.2; }
        .verify-tag { font-size: 9px; color: var(--success); font-weight: 800; text-transform: uppercase; margin-top: 4px; display: block; letter-spacing: 0.5px; }
        
        .view-btn {
            background: rgba(10, 132, 255, 0.1); color: var(--accent); padding: 8px 14px;
            border-radius: 12px; font-size: 11px; font-weight: 700; text-decoration: none; border: 1px solid rgba(10, 132, 255, 0.2);
        }

        .stats { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 18px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 16px; }
        .stat-box { text-align: center; width: 33%; }
        .stat-val { font-size: 15px; font-weight: 800; display: block; color: #fff; }
        .stat-lbl { font-size: 9px; color: var(--hint); text-transform: uppercase; margin-top: 2px; display: block;}

        .format-badge {
            background: rgba(255,255,255,0.05); color: var(--hint);
            padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700;
            margin-bottom: 15px; display: inline-block; border: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
        }

        .price-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 18px; }
        .price { font-size: 22px; font-weight: 900; }
        .price span { font-size: 13px; color: var(--hint); font-weight: normal; }

        .order-btn {
            background: var(--accent); color: white; padding: 12px 24px; 
            border-radius: 14px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }

        #loading { text-align: center; padding: 50px; color: var(--hint); }
        .loader { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: var(--accent); animation: spin 1s infinite linear; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="glass-header">
        <div class="header-top">
            <div class="header"><h1>TEQRA <span>Ads</span></h1></div>
            <div class="nav-btns">
                <button class="nav-btn" onclick="tg.openTelegramLink('https://t.me/TEQRA_Manager')">⭐️ Відгуки</button>
                <button class="nav-btn" onclick="showSecurity()">🛡 Гарантії</button>
            </div>
        </div>
        <div class="status-line"><div class="status-dot"></div> БАЗА ОНОВЛЕНА: СЬОГОДНІ</div>
        <div class="filters" id="catContainer">
            <div class="chip active" onclick="filterByCat('all', this)">Всі канали</div>
        </div>
    </div>

    <div class="main-content">
        <div id="list"><div id="loading"><div class="loader"></div>Завантаження маркетплейсу...</div></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.setHeaderColor('#0f0f10');
        tg.setBackgroundColor('#0f0f10');

        const vibe = (type = 'light') => { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type); };

        function showSecurity() {
            vibe('medium');
            tg.showPopup({
                title: '🛡 Гарантії TEQRA Ads',
                message: '• Канали перевірені на ботів через TGStat\n• Безпечна оплата через менеджера\n• Гарантований вихід або повернення коштів',
                buttons: [{type: 'ok', text: 'Зрозуміло'}]
            });
        }

        const formatK = (n) => {
            if (!n || isNaN(n)) return '0';
            if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/, '') + 'М';
            if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/, '') + 'к';
            return n;
        };

        const SHEET_ID = '1arC_OE150V-0onKPWEwhNpK_ZuBJhJ0ZWvRSF2VwFu8';
        const ADMIN = 'TEQRA_Manager'; 
        let channels = [];

        async function init() {
            try {
                // cachebust додається, щоб Google не віддавав старі нулі
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&cb=${Date.now()}`);
                const text = await res.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                
                // Функція для перетворення тексту в число
                const getNum = (val) => {
                    if (!val) return 0;
                    let v = val.v !== undefined ? val.v : val.f;
                    if (!v) return 0;
                    let clean = String(v).replace(/[^0-9.]/g, '');
                    return Number(clean) || 0;
                };

                channels = json.table.rows.map(r => ({
                    id: r.c[0]?.v, 
                    title: r.c[1]?.v || r.c[1]?.f, 
                    link: r.c[2]?.v || r.c[2]?.f,
                    catName: r.c[4]?.v || r.c[4]?.f, 
                    subs: getNum(r.c[5]), 
                    views: getNum(r.c[6]),
                    er: getNum(r.c[7]), 
                    price: getNum(r.c[8]), // Отримуємо числове значення з колонки I
                    format: r.c[9]?.v || r.c[9]?.f || '2/48'
                })).filter(c => c.title && c.title !== 'title');

                // Фільтри категорій
                const cats = [...new Set(channels.map(c => {
                    if (!c.catName) return null;
                    let name = c.catName.toString().trim();
                    return name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
                }).filter(Boolean))];

                const container = document.getElementById('catContainer');
                container.innerHTML = '<div class="chip active" onclick="filterByCat(\'all\', this)">Всі канали</div>';
                cats.forEach(c => {
                    container.innerHTML += `<div class="chip" onclick="filterByCat('${c}', this)">${c}</div>`;
                });
                
                render(channels);
            } catch (e) { 
                document.getElementById('list').innerHTML = '<div style="text-align:center; padding:40px;">❌ Помилка завантаження бази. Спробуйте оновити.</div>'; 
            }
        }

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach((ch, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${i * 0.05}s`;
                card.innerHTML = `
                    <div class="card-top">
                        <div>
                            <h2 class="title">${ch.title}</h2>
                            <span class="verify-tag">✓ Перевірено TEQRA</span>
                        </div>
                        <a href="#" class="view-btn" onclick="vibe(); event.stopPropagation(); tg.openTelegramLink('${ch.link}')">🔍 Канал</a>
                    </div>
                    
                    <div class="format-badge">Формат: ${ch.format}</div>

                    <div class="stats">
                        <div class="stat-box"><span class="stat-val">${formatK(ch.subs)}</span><span class="stat-lbl">Сабів</span></div>
                        <div class="stat-box"><span class="stat-val">${formatK(ch.views)}</span><span class="stat-lbl">Охопл</span></div>
                        <div class="stat-box"><span class="stat-val">${ch.er}%</span><span class="stat-lbl">ER</span></div>
                    </div>
                    
                    <div class="price-row">
                        <div class="price">${Number(ch.price).toLocaleString('uk-UA')} <span>₴</span></div>
                        <div class="order-btn" onclick="order('${ch.title}', '${ch.price}', '${ch.format}')">Обрати</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function order(title, price, format) {
            vibe('heavy');
            const msg = `⚡️ Заявка TEQRA Ads\n\nКанал: ${title}\nФормат: ${format}\nЦіна: ${Number(price).toLocaleString()} ₴\n\nЧекаю на деталі оплати!`;
            tg.openTelegramLink(`https://t.me/${ADMIN}?text=${encodeURIComponent(msg)}`);
        }

        function filterByCat(cat, el) {
            vibe();
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            
            if (cat === 'all') {
                render(channels);
            } else {
                const filtered = channels.filter(c => 
                    c.catName && c.catName.toString().trim().toLowerCase() === cat.toLowerCase()
                );
                render(filtered);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        init();
    </script>
</body>
</html>
