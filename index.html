<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TEQRA Ads Ecosystem</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f0f10; --card: #1c1c1e; --accent: #0A84FF;
            --text: #ffffff; --hint: #8e8e93; --success: #30D158;
            --warning: #FFD60A; --tab-bg: #252527;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }

        /* Навігація внизу (Таби) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 65px;
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--hint); font-size: 10px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; }

        .glass-header { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header h1 { font-size: 22px; font-weight: 800; margin: 0; }
        .header span { color: var(--accent); }

        /* Картка профілю */
        .profile-card { background: var(--card); border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .user-id { font-size: 12px; color: var(--hint); margin-bottom: 5px; }
        .balance-box { font-size: 28px; font-weight: 900; margin-bottom: 15px; }
        .btn-topup { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; width: 100%; }

        /* Картка каналу */
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .price-breakdown { font-size: 11px; color: var(--hint); background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; margin: 12px 0; }
        .price-breakdown div { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .price-total { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; color: #fff; font-weight: 700; }

        .safe-tag { color: var(--success); font-size: 10px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 4px; margin-bottom: 10px; }
        
        #market-page, #profile-page { display: none; }
        .active-page { display: block !important; }
    </style>
</head>
<body>

    <div id="market-page" class="active-page">
        <div class="glass-header">
            <div class="header"><h1>TEQRA <span>Ads</span></h1></div>
        </div>
        <div id="list"></div>
    </div>

    <div id="profile-page">
        <div class="glass-header"><div class="header"><h1>Мій <span>Кабінет</span></h1></div></div>
        <div class="profile-card">
            <div class="user-id" id="user-name">Завантаження...</div>
            <div class="balance-box">0.00 ₴</div>
            <button class="btn-topup" onclick="topUp()">💳 Поповнити баланс</button>
            <p style="font-size: 11px; color: var(--hint); margin-top: 15px;">🔒 Кошти захищені системою безпечних угод TEQRA SafePay.</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('market', this)">
            <span class="nav-icon">🛍</span><span>Маркет</span>
        </div>
        <div class="nav-item" onclick="switchPage('profile', this)">
            <span class="nav-icon">👤</span><span>Кабінет</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        
        const ADMIN = 'TEQRA_Manager';
        const SHEET_ID = '1arC_OE150V-0onKPWEwhNpK_ZuBJhJ0ZWvRSF2VwFu8';

        document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || 'Користувач';

        function switchPage(page, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('market-page').classList.remove('active-page');
            document.getElementById('profile-page').classList.remove('active-page');
            document.getElementById(page + '-page').classList.add('active-page');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        async function loadData() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&cb=${Date.now()}`);
                const text = await res.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                
                const rows = json.table.rows;
                const list = document.getElementById('list');
                list.innerHTML = '';

                rows.forEach(r => {
                    const title = r.c[1]?.v || r.c[1]?.f;
                    if(!title || title === 'title') return;

                    const rawPrice = Number(String(r.c[8]?.v || r.c[8]?.f).replace(/[^0-9.]/g, '')) || 0;
                    const commission = Math.round(rawPrice * 0.15); // Твоя комісія 15%
                    const totalPrice = rawPrice + commission;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="safe-tag">🛡 TEQRA SafePay | Безпечна угода</div>
                        <h2 style="margin:0;">${title}</h2>
                        
                        <div class="price-breakdown">
                            <div><span>Ціна адміна:</span> <span>${rawPrice} ₴</span></div>
                            <div><span>Комісія сервісу:</span> <span>${commission} ₴</span></div>
                            <div class="price-total"><span>До сплати:</span> <span>${totalPrice} ₴</span></div>
                        </div>
                        
                        <button class="btn-topup" onclick="order('${title}', ${totalPrice})">⚡️ Купити розміщення</button>
                    `;
                    list.appendChild(card);
                });
            } catch(e) { console.error(e); }
        }

        function order(title, price) {
            const msg = `💼 ЗАЯВКА НА РОЗМІЩЕННЯ\n\nКанал: ${title}\nСума: ${price} ₴\n\nБажаю оплатити через баланс кабінету (SafePay).`;
            tg.openTelegramLink(`https://t.me/${ADMIN}?text=${encodeURIComponent(msg)}`);
        }

        function topUp() {
            const msg = `💳 ПОПОВНЕННЯ БАЛАНСУ\n\nБажаю поповнити баланс особистого кабінету TEQRA Ads.\nНадішліть реквізити для оплати.`;
            tg.openTelegramLink(`https://t.me/${ADMIN}?text=${encodeURIComponent(msg)}`);
        }

        loadData();
    </script>
</body>
</html>
